# uv run python -m nwm_routing -f -V5 test_case.yaml
#--------------------------------------------------------------------------------
log_parameters:
    #----------
    showtiming: True
    log_level : INFO
#--------------------------------------------------------------------------------
network_topology_parameters:
    #----------
    supernetwork_parameters:
        #----------
        geo_file_path: domain/02374250.gpkg
    waterbody_parameters:
      #----------
        break_network_at_waterbodies: True
#--------------------------------------------------------------------------------
compute_parameters:
    #----------
    parallel_compute_method: by-subnetwork-jit-clustered #serial 
    compute_kernel         : V02-structured
    assume_short_ts        : True
    subnetwork_target_size : 10000
    cpu_pool               : 1
    restart_parameters:
        #----------
        start_datetime: "2000-01-01 00:00:00"
    forcing_parameters:
        #----------
        qts_subdivisions            : 12
        dt                          : 300 # [sec]
        qlat_input_folder           : channel_forcing/
        qlat_file_pattern_filter    : "*.CHRTOUT_DOMAIN1.csv"
        nts                         : 5760 #288 for 1day THIS HAS TO MATCH THE SIMULATION TIME PERIOD
        max_loop_size               : 288 # [hr]  
    data_assimilation_parameters:
        streamflow_da:
    #        #----------
            streamflow_nudging            : False
            diffusive_streamflow_nudging  : False
        reservoir_da:
            #----------
            reservoir_persistence_da:
                #----------
                reservoir_persistence_usgs  : False
            reservoir_rfc_da:
                #----------
                reservoir_rfc_forecasts: False
#--------------------------------------------------------------------------------
output_parameters:
  stream_output:
      stream_output_directory: output/
      stream_output_time: -1 # [hr]
      stream_output_type: '.nc'
      stream_output_internal_frequency: 60
